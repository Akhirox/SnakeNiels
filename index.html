<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niels le Facteur 🐍</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0e17;
    --yellow: #f0b429;
    --teal: #4ecdc4;
    --pink: #ff6b9d;
    --gray: #a7a9be;
    --white: #fffffe;
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--white);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 15%, rgba(78,205,196,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(240,180,41,0.08) 0%, transparent 55%);
    pointer-events: none;
  }
  h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    letter-spacing: 4px;
    color: var(--yellow);
    text-shadow: 3px 3px 0 #7a5a00, 0 0 30px rgba(240,180,41,0.35);
    margin-bottom: 2px;
    text-align: center;
  }
  #hud {
    display: flex; gap: 2rem;
    margin-bottom: 8px;
  }
  .hud-item { display: flex; flex-direction: column; align-items: center; }
  .hud-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gray); }
  .hud-value {
    font-family: 'Bangers', cursive;
    font-size: 1.5rem; letter-spacing: 1px;
    color: var(--yellow);
    text-shadow: 2px 2px 0 #7a5a00;
    min-width: 2ch; text-align: center;
  }
  #canvasWrapper {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 0 3px var(--yellow), 0 0 50px rgba(240,180,41,0.15), 0 20px 60px rgba(0,0,0,0.7);
  }
  canvas { display: block; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,25,0.9);
    backdrop-filter: blur(6px);
    gap: 10px;
    border-radius: 14px;
  }
  #overlay.hidden { display: none; }
  .overlay-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--yellow);
    text-shadow: 3px 3px 0 #7a5a00;
    letter-spacing: 3px;
    text-align: center; line-height: 1;
  }
  .overlay-emoji { font-size: 2.5rem; }
  .overlay-sub {
    font-size: 0.95rem; color: var(--gray);
    text-align: center; max-width: 300px; line-height: 1.5;
  }
  .legend {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 0.8rem; color: var(--gray);
    background: rgba(255,255,255,0.05);
    border-radius: 10px; padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .legend-row { display: flex; align-items: center; gap: 8px; }
  .legend-badge {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
    padding: 2px 7px; border-radius: 20px; text-transform: uppercase;
  }
  .badge-common { background: rgba(78,205,196,0.2); color: var(--teal); }
  .badge-uncommon { background: rgba(240,180,41,0.2); color: var(--yellow); }
  .badge-rare { background: rgba(255,107,157,0.2); color: var(--pink); }
  #startBtn {
    margin-top: 6px;
    padding: 11px 34px;
    border-radius: 50px; border: none;
    background: var(--yellow); color: #1a1000;
    font-family: 'Bangers', cursive;
    font-size: 1.4rem; letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 4px 0 #7a5a00, 0 8px 20px rgba(240,180,41,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #startBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #7a5a00; }
  #startBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #7a5a00; }
  #controls {
    margin-top: 6px;
    font-size: 0.72rem; color: var(--gray); text-align: center;
  }
  .key {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px; padding: 1px 6px;
    font-size: 0.68rem; font-weight: 700;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -200%) scale(0.9); }
  }
  .feedback-pop {
    position: absolute;
    pointer-events: none;
    font-family: 'Bangers', cursive;
    font-size: 1.3rem; letter-spacing: 1px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
    animation: floatUp 0.8s ease forwards;
    white-space: nowrap;
  }
</style>
</head>
<body>

<h1>🐍 NIELS LE FACTEUR</h1>

<div id="hud">
  <div class="hud-item">
    <span class="hud-label">Score</span>
    <span class="hud-value" id="scoreEl">0</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">Record</span>
    <span class="hud-value" id="bestEl">0</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">Niveau</span>
    <span class="hud-value" id="levelEl">1</span>
  </div>
</div>

<div id="canvasWrapper">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <div class="overlay-emoji">📬</div>
    <div class="overlay-title" id="overlayTitle">NIELS LE FACTEUR</div>
    <p class="overlay-sub" id="overlaySub">Guide Niels pour collecter le courrier !</p>
    <div class="legend">
      <div class="legend-row"><span class="legend-badge badge-common">Commun</span> Lettres — +1 pt</div>
      <div class="legend-row"><span class="legend-badge badge-uncommon">Peu commun</span> Colis — +3 pts</div>
      <div class="legend-row"><span class="legend-badge badge-rare">Rare</span> Recommandé — +8 pts 🔥</div>
    </div>
    <button id="startBtn" onclick="startGame()">JOUER !</button>
  </div>
</div>

<p id="controls">
  <span class="key">↑ ↓ ← →</span> ou <span class="key">Z Q S D</span> pour diriger &nbsp;·&nbsp; <span class="key">P</span> pause
</p>

<script>
const BASE = 'https://raw.githubusercontent.com/Akhirox/Snakeniels/main/assets/';

const ASSETS = {
  niels_ferme: BASE + 'niels_ferme.png',
  niels_ouvert: BASE + 'niels_ouvert.png',
  lettre_1: BASE + 'lettre_1.png',
  lettre_2: BASE + 'lettre_2.png',
  lettre_3: BASE + 'lettre_3.png',
  lettre_4: BASE + 'lettre_4.png',
  colis_1: BASE + 'colis_1.png',
  colis_2: BASE + 'colis_2.png',
  colis_3: BASE + 'colis_3.png',
  recommande: BASE + 'recommande.jpg',
};

const images = {};
let imagesReady = 0;
const totalImages = Object.keys(ASSETS).length;

function loadImages(cb) {
  Object.entries(ASSETS).forEach(([key, src]) => {
    const img = new Image();
    img.onload = img.onerror = () => { imagesReady++; if (imagesReady === totalImages) cb(); };
    img.src = src;
    images[key] = img;
  });
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('canvasWrapper');

const W = Math.min(window.innerWidth - 16, 560);
const H = Math.min(window.innerHeight - 160, 520);
canvas.width = W;
canvas.height = H;

const STEP = 22;
const HEAD_R = 18;
const BODY_R = 9;
const SPEED_BASE = 3.5;
const TURN_SMOOTHING = 0.18;
const ITEM_SIZE = 34;

const BODY_COLORS = ['#4ecdc4','#45b7d1','#6bcb77','#88d8b0','#96ceb4'];

let snake, items, score, best, level, baseSpeed, running, paused, animId;
let mouthOpen = false, mouthTimer = 0;
let lastTime = 0;

best = parseInt(localStorage.getItem('niels_snake_best') || '0');
document.getElementById('bestEl').textContent = best;

function rnd(n) { return Math.random() * n; }
function rndInt(n) { return Math.floor(Math.random() * n); }

function makeSnake() {
  const cx = W / 2, cy = H / 2;
  const segs = [];
  for (let i = 0; i < 6; i++) {
    segs.push({ x: cx - i * STEP, y: cy, angle: 0 });
  }
  return {
    segments: segs,
    targetAngle: 0,
    currentAngle: 0,
    speed: SPEED_BASE,
    growing: 0,
  };
}

function spawnItem() {
  const roll = Math.random();
  let type, keys, pts;
  if (roll < 0.65) {
    type = 'lettre'; keys = ['lettre_1','lettre_2','lettre_3','lettre_4']; pts = 1;
  } else if (roll < 0.92) {
    type = 'colis'; keys = ['colis_1','colis_2','colis_3']; pts = 3;
  } else {
    type = 'recommande'; keys = ['recommande']; pts = 8;
  }
  const key = keys[rndInt(keys.length)];
  const margin = 40;
  return {
    x: margin + rnd(W - margin * 2),
    y: margin + rnd(H - margin * 2),
    type, key, pts,
    pulse: rnd(Math.PI * 2),
    size: ITEM_SIZE,
    glow: type === 'recommande',
  };
}

function initGame() {
  snake = makeSnake();
  items = [];
  score = 0; level = 1; baseSpeed = SPEED_BASE;
  running = true; paused = false;
  mouthOpen = false; mouthTimer = 0;
  for (let i = 0; i < 5; i++) items.push(spawnItem());
  document.getElementById('scoreEl').textContent = 0;
  document.getElementById('levelEl').textContent = 1;
}

let keysHeld = {};
document.addEventListener('keydown', e => {
  keysHeld[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === 'p' || e.key === 'P') paused = !paused;
});
document.addEventListener('keyup', e => { keysHeld[e.key] = false; });

let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    snake.targetAngle = dx > 0 ? 0 : Math.PI;
  } else {
    snake.targetAngle = dy > 0 ? Math.PI/2 : -Math.PI/2;
  }
}, {passive: true});

function getTargetAngle() {
  const up = keysHeld['ArrowUp'] || keysHeld['z'] || keysHeld['Z'];
  const down = keysHeld['ArrowDown'] || keysHeld['s'] || keysHeld['S'];
  const left = keysHeld['ArrowLeft'] || keysHeld['q'] || keysHeld['Q'];
  const right = keysHeld['ArrowRight'] || keysHeld['d'] || keysHeld['D'];
  if (right) return 0;
  if (down) return Math.PI / 2;
  if (left) return Math.PI;
  if (up) return -Math.PI / 2;
  return null;
}

function angleDiff(a, b) {
  let d = b - a;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

function lerpAngle(a, b, t) {
  return a + angleDiff(a, b) * t;
}

function update(dt) {
  if (!running || paused) return;

  const targetKey = getTargetAngle();
  if (targetKey !== null) {
    const diff = angleDiff(snake.currentAngle, targetKey);
    if (Math.abs(diff) > 0.1) {
      snake.currentAngle = lerpAngle(snake.currentAngle, targetKey, TURN_SMOOTHING);
    } else {
      snake.currentAngle = targetKey;
    }
  }

  const spd = snake.speed * dt * 60;
  const head = snake.segments[0];
  const newHead = {
    x: head.x + Math.cos(snake.currentAngle) * spd,
    y: head.y + Math.sin(snake.currentAngle) * spd,
    angle: snake.currentAngle,
  };

  if (newHead.x < HEAD_R || newHead.x > W - HEAD_R ||
      newHead.y < HEAD_R || newHead.y > H - HEAD_R) {
    endGame(); return;
  }

  const safeZone = Math.max(20, snake.growing + 12);
  for (let i = safeZone; i < snake.segments.length - 2; i++) {
    const s = snake.segments[i];
    const dx = newHead.x - s.x, dy = newHead.y - s.y;
    if (Math.sqrt(dx*dx + dy*dy) < BODY_R * 1.3) {
      endGame(); return;
    }
  }

  snake.segments.unshift(newHead);

  if (snake.growing > 0) {
    snake.growing--;
  } else {
    snake.segments.pop();
  }

  mouthTimer = Math.max(0, mouthTimer - dt * 60);
  if (mouthTimer <= 0) mouthOpen = false;

  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    const dx = newHead.x - item.x, dy = newHead.y - item.y;
    if (Math.sqrt(dx*dx + dy*dy) < HEAD_R + item.size / 2.2) {
      score += item.pts;
      document.getElementById('scoreEl').textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('niels_snake_best', best);
        document.getElementById('bestEl').textContent = best;
      }
      showFeedback(item.x, item.y, '+' + item.pts, item.type === 'recommande' ? '#ff6b9d' : item.type === 'colis' ? '#f0b429' : '#4ecdc4');
      items.splice(i, 1);
      items.push(spawnItem());
      if (Math.random() < 0.25) items.push(spawnItem());
      if (items.length > 8) items.shift();
      snake.growing += item.pts * 2 + 2;
      mouthOpen = true;
      mouthTimer = 18;
      const newLevel = Math.floor(score / 15) + 1;
      if (newLevel !== level) {
        level = newLevel;
        document.getElementById('levelEl').textContent = level;
        snake.speed = SPEED_BASE + (level - 1) * 0.3;
      }
    }
  }
}

function drawBody() {
  const segs = snake.segments;
  if (segs.length < 2) return;

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const totalSegs = segs.length;
  const chunkSize = Math.max(1, Math.floor(totalSegs / BODY_COLORS.length));

  for (let ci = 0; ci < BODY_COLORS.length; ci++) {
    const start = ci * chunkSize;
    const end = ci === BODY_COLORS.length - 1 ? totalSegs - 1 : (ci + 1) * chunkSize;
    if (start >= totalSegs - 1) break;

    ctx.beginPath();
    ctx.moveTo(segs[start].x, segs[start].y);
    for (let i = start + 1; i <= Math.min(end, totalSegs - 1); i++) {
      const prev = segs[i - 1];
      const curr = segs[i];
      const mx = (prev.x + curr.x) / 2;
      const my = (prev.y + curr.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }

    const fade = 1 - ci * 0.12;
    ctx.globalAlpha = Math.max(0.3, fade);
    ctx.strokeStyle = BODY_COLORS[ci];

    const bodyWidth = Math.max(8, BODY_R * 2 - ci * 0.5);
    ctx.lineWidth = bodyWidth;
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = bodyWidth * 0.35;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawHead() {
  const head = snake.segments[0];
  const img = mouthOpen ? images['niels_ouvert'] : images['niels_ferme'];
  const r = HEAD_R;

  ctx.save();
  ctx.translate(head.x, head.y);
  ctx.rotate(snake.currentAngle + Math.PI / 2);

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.closePath();

  if (img && img.complete && img.naturalWidth > 0) {
    ctx.clip();
    ctx.drawImage(img, -r, -r, r * 2, r * 2);
  } else {
    ctx.fillStyle = '#ff6b35';
    ctx.fill();
    ctx.font = `bold ${r}px Bangers`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('N', 0, 1);
  }

  ctx.restore();

  ctx.beginPath();
  ctx.arc(head.x, head.y, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawItems(now) {
  items.forEach(item => {
    item.pulse += 0.05;
    const sc = 1 + Math.sin(item.pulse) * 0.07;
    const img = images[item.key];
    const s = item.size * sc;

    ctx.save();
    ctx.translate(item.x, item.y);

    if (item.glow) {
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, s);
      g.addColorStop(0, 'rgba(255,107,157,0.35)');
      g.addColorStop(1, 'rgba(255,107,157,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, s, 0, Math.PI * 2);
      ctx.fill();
    }

    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, -s/2, -s/2, s, s);
    } else {
      ctx.fillStyle = item.type === 'recommande' ? '#ff6b9d' : item.type === 'colis' ? '#f0b429' : '#4ecdc4';
      ctx.beginPath();
      ctx.arc(0, 0, s/2, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.floor(s*0.45)}px Bangers`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(item.type === 'recommande' ? 'R' : item.type === 'colis' ? 'C' : 'L', 0, 1);
    }

    ctx.restore();
  });
}

function drawBg() {
  ctx.fillStyle = '#0f0e17';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.018)';
  ctx.lineWidth = 0.5;
  const gs = 30;
  for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function showFeedback(x, y, text, color) {
  const div = document.createElement('div');
  div.className = 'feedback-pop';
  div.textContent = text;
  div.style.color = color;
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  wrapper.appendChild(div);
  setTimeout(() => div.remove(), 850);
}

function draw(now) {
  drawBg();
  drawBody();
  drawItems(now);
  drawHead();
  if (paused) {
    ctx.fillStyle = 'rgba(10,10,25,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f0b429';
    ctx.font = 'bold 2rem Bangers';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '4px';
    ctx.fillText('PAUSE', W/2, H/2);
  }
}

function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  draw(now);
  animId = requestAnimationFrame(loop);
}

function endGame() {
  running = false;
  cancelAnimationFrame(animId);
  draw(0);
  const overlay = document.getElementById('overlay');
  document.getElementById('overlayTitle').textContent = 'GAME OVER !';
  document.getElementById('overlaySub').innerHTML =
    `Niels s'est perdu dans sa tournée 😵<br>Score : <b style="color:#f0b429">${score}</b> &nbsp;|&nbsp; Record : <b style="color:#4ecdc4">${best}</b>`;
  document.getElementById('startBtn').textContent = 'REJOUER !';
  overlay.classList.remove('hidden');
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  if (animId) cancelAnimationFrame(animId);
  initGame();
  lastTime = performance.now();
  animId = requestAnimationFrame(loop);
}

loadImages(() => {
  draw(0);
});
</script>
</body>
</html>
